<!DOCTYPE html>
<html lang="en"> <!--this sets html language to english-->
<head> <!--this header section provides information about the document's encoding, sets the title, and links to external resources-->
    <meta charset="UTF-9"> <!--setting to unicode 8 -- this uses 1 to 4 bytes per character-->
    <meta name="viewport" content= "width-device-width, initial-scale=1.0"> <!--this sets the width of the website-->
    <meta http-equiv="X-UA-Compatible" content="ie=edge"> <!--this makes the website work in the latest internet explorer version -->
    <title>Commercial Property Taxes</title> <!--this is the title-->
    
    <!--Commercial Property Taxes CSS-->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />

    <!--ERI CSS-->
    <link rel="stylesheet" type="text/css" href="static/css/style.css">

    <!--Google Font-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />

<!--this is the body of the website - it's how we lay out the structure
i've structured it below so that there is a larger view called app, which holds our map and bottom panel. 
the bottom pannel includes a table, which expands as we select properties to add to the table -->
<body> 
    <!--This div holds our map-->
    <div id="app"> <!--this is the larger container for the site-->
        <div class="container">
            <input type ="radio" name="option" id="1" />
            <label for="1">
                <div class="tab-name">9-County Bay Area + Santa Cruz</div>
            </label>
                  
            <input type ="radio" name="option" id="2" />
            <label for="2">
                <div class="tab-name">Central Valley</div>
            </label>

            <input type ="radio" name="option" id="3" checked />
            <label for="3">
                <div class="tab-name">Central Coast</div>
            </label>

            <input type ="radio" name="option" id="4" />
            <label for="4">
                <div class="tab-name">Sacramento Region</div>
            </label>
            
            <input type ="radio" name="option" id="5" />
            <label for="5">
                <div class="tab-name">South Coast</div>
            </label>
            
            <input type ="radio" name="option" id="6" />
            <label for="6">
                <div class="tab-name">Inland Empire</div>
            </label>
            </div>
            <div id="map"></div>
            <div id="legend-container">
                <div id="legend-header">
                    <h1>Legend</h1>
                    <h2>Assessed Land Value/ Total Land SQFT</h2>
                </div>
                    <p><div class="circle-1"></div><span class=legend-text>Less than $15/sqft</span></p>
                    <p><div class="circle-2"></div><span class=legend-text>$15-$35/sqft</span></p>
                    <p><div class="circle-3"></div><span class=legend-text>$35-$60/sqft</span></p>
                    <p><div class="circle-4"></div><span class=legend-text>$60-$100/sqft</span></p>
                    <p><div class="circle-5"></div><span class=legend-text>$100-250/sqft</span></p>
                    <p><div class="circle-6"></div><span class=legend-text>$250 or more/sqft</span></p>
                </div>
                        <div class ="search-box">
                <span class="search-icon material-symbols-outlined">search</span>
                <input type="text"  id="search" placeholder="Search properties">
            </div>
            <div class="filter-container">
            <button class="openModal">Filter ▼</button>
            <div id="modal" class="hidden">
                <div class="modal-inner">
                    <button class="closeModal">X</button>
                    <h2>Filters</h2>
                    <!-- Land Value  -->
                    <div class="filter-group">
                        <label class="filter-group-title">Land Value / sqft</label>
                        <div class="range-inputs">
                            <input type="number" id="land-value-min" value="0" min="0" placeholder="$0"></label>
                            <span>—</span>
                            <input type="number" id="land-value-max" value="500" min="0" placeholder="$10,000"></label>
                        </div>
                </div>
                <button id="apply-filter">Apply Filters</button>
                <button id="reset-filter">Reset</button>
                </div>
        </div>
            </div>
            </div>
        </div> <!--this is the map container for the site-->
        </div>
    </div>

    <!--Leaflet JS-->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>

    <!--zipcelx-->
    <script src="https://cdn.jsdelivr.net/npm/zipcelx@1.6.2/lib/standalone.js"></script>
 
    <!--D3 JS-->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- ERI JS-->
     <script src="static/js/central-coast.js"></script>
     <script src="static/js/tabs.js"></script>
</body>
